services:
  - type: web
    name: fraudwatch-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: MONGO_URI
        sync: false        # Set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: DB_NAME
        value: fraudwatch
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: FRONTEND_URL
        sync: false        # Set to your Vercel URL after deploying frontend
